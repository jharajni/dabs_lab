# The main pipeline for etl_pipeline_lab

resources:
  pipelines:
    etl_pipeline_lab_etl:
      name: etl_pipeline_lab_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/etl_pipeline_lab_etl"

      libraries:
        - glob:
            include: ../src/etl_pipeline_lab_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
